<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#334155;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="olmoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="llm360Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="thinkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.9" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" opacity="0.7"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bgGradient)"/>
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="#ffffff" opacity="0.07"/>
  </pattern>
  <rect width="1200" height="675" fill="url(#dots)"/>

  <!-- Title -->
  <text x="600" y="52" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="30" font-weight="bold" opacity="0.95">OLMo  vs  LLM360</text>
  <text x="600" y="82" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="15" opacity="0.8">Two Routes to Fully-Open LLMs</text>

  <!-- central vs divider -->
  <line x1="600" y1="130" x2="600" y2="560" stroke="#475569" stroke-width="2" stroke-dasharray="6 6" opacity="0.4"/>
  <circle cx="600" cy="345" r="26" fill="#1e293b" stroke="#475569" stroke-width="2"/>
  <text x="600" y="352" text-anchor="middle" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="16" font-weight="bold">VS</text>

  <!-- ===== LEFT: OLMo (AI2, USA) ===== -->
  <text x="300" y="135" text-anchor="middle" fill="#60a5fa" font-family="Arial, sans-serif" font-size="22" font-weight="bold">OLMo</text>
  <text x="300" y="158" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="13" opacity="0.85">Allen Institute for AI · USA</text>

  <!-- OLMo 1 -->
  <rect x="120" y="190" width="110" height="48" rx="9" fill="url(#olmoGrad)" filter="url(#glow)"/>
  <text x="175" y="212" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="13" font-weight="bold">OLMo 1</text>
  <text x="175" y="229" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10" opacity="0.85">7B · 2024-02</text>

  <!-- OLMo 2 -->
  <rect x="245" y="190" width="110" height="48" rx="9" fill="url(#olmoGrad)" filter="url(#glow)"/>
  <text x="300" y="212" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="13" font-weight="bold">OLMo 2</text>
  <text x="300" y="229" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10" opacity="0.85">7B/13B · 2024-11</text>

  <!-- OLMo 3 Think (flagship) -->
  <rect x="370" y="190" width="120" height="48" rx="9" fill="url(#thinkGrad)" filter="url(#glow)"/>
  <text x="430" y="212" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="13" font-weight="bold">OLMo 3-Think</text>
  <text x="430" y="229" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10" opacity="0.9">7B/32B · 2025-11</text>

  <!-- arrows -->
  <line x1="230" y1="214" x2="240" y2="214" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.6"/>
  <line x1="355" y1="214" x2="365" y2="214" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.6"/>

  <!-- OLMo stats -->
  <text x="300" y="278" text-anchor="middle" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="14" font-weight="bold" opacity="0.9">Flagship benchmarks</text>
  <text x="300" y="306" text-anchor="middle" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="14" opacity="0.85">MATH <tspan font-weight="bold" fill="#a78bfa">96.1</tspan> · AIME'25 <tspan font-weight="bold" fill="#a78bfa">72.5</tspan></text>
  <text x="300" y="328" text-anchor="middle" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="14" opacity="0.85">MMLU-Pro <tspan font-weight="bold" fill="#a78bfa">75.9</tspan> · IFEval <tspan font-weight="bold" fill="#a78bfa">89.0</tspan></text>

  <!-- OLMo tagline -->
  <text x="300" y="430" text-anchor="middle" fill="#60a5fa" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Strongest fully-open base</text>
  <text x="300" y="452" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12" opacity="0.8">approaches Qwen 3 at same size</text>
  <text x="300" y="470" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12" opacity="0.8">entire model flow open-sourced</text>

  <!-- ===== RIGHT: LLM360 (MBZUAI, UAE) ===== -->
  <text x="900" y="135" text-anchor="middle" fill="#fbbf24" font-family="Arial, sans-serif" font-size="22" font-weight="bold">LLM360</text>
  <text x="900" y="158" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="13" opacity="0.85">MBZUAI · UAE</text>

  <!-- Amber/Crystal -->
  <rect x="670" y="190" width="120" height="48" rx="9" fill="url(#llm360Grad)" filter="url(#glow)"/>
  <text x="730" y="212" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Amber / Crystal</text>
  <text x="730" y="229" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10" opacity="0.85">7B · 2023-12</text>

  <!-- K2-V2 (flagship) -->
  <rect x="805" y="190" width="120" height="48" rx="9" fill="url(#thinkGrad)" filter="url(#glow)"/>
  <text x="865" y="212" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="13" font-weight="bold">K2-V2</text>
  <text x="865" y="229" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10" opacity="0.9">70B dense · 2026</text>

  <!-- arrow -->
  <line x1="790" y1="214" x2="800" y2="214" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.6"/>

  <!-- LLM360 stats -->
  <text x="900" y="278" text-anchor="middle" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="14" font-weight="bold" opacity="0.9">K2-V2 benchmarks</text>
  <text x="900" y="306" text-anchor="middle" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="14" opacity="0.85">MATH <tspan font-weight="bold" fill="#a78bfa">94.7</tspan> · GSM8K <tspan font-weight="bold" fill="#a78bfa">93.6</tspan></text>
  <text x="900" y="328" text-anchor="middle" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="14" opacity="0.85">GPQA-D <tspan font-weight="bold" fill="#a78bfa">55.1</tspan></text>

  <!-- LLM360 tagline -->
  <text x="900" y="430" text-anchor="middle" fill="#fbbf24" font-family="Arial, sans-serif" font-size="16" font-weight="bold">360° transparency</text>
  <text x="900" y="452" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12" opacity="0.8">single-point 70B flagship</text>
  <text x="900" y="470" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12" opacity="0.8">data + code + logs + checkpoints</text>

  <!-- common foundation bar -->
  <rect x="180" y="515" width="840" height="50" rx="12" fill="#0f172a" stroke="#475569" stroke-width="1.5" opacity="0.9"/>
  <text x="600" y="538" text-anchor="middle" fill="#34d399" font-family="Arial, sans-serif" font-size="15" font-weight="bold">Common ground: fully open · data + code + weights + checkpoints</text>
  <text x="600" y="557" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12" opacity="0.8">both trail the best open-weights on general knowledge (MMLU / GPQA)</text>

  <!-- key people / orgs -->
  <text x="300" y="608" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="13" opacity="0.75">Dirk Groeneveld · Matt Gardner</text>
  <text x="900" y="608" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="13" opacity="0.75">Eric Xing · MBZUAI · Petuum · Cerebras</text>

  <!-- corner badges -->
  <text x="60" y="635" fill="#60a5fa" font-family="monospace" font-size="40" opacity="0.12">{ }</text>
  <text x="1110" y="635" fill="#fbbf24" font-family="monospace" font-size="40" opacity="0.12">360°</text>
</svg>
