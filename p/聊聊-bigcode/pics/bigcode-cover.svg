<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#334155;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="modelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="evalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="dataGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:0.9" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" opacity="0.7"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bgGradient)"/>
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="#ffffff" opacity="0.07"/>
  </pattern>
  <rect width="1200" height="675" fill="url(#dots)"/>

  <!-- Title -->
  <text x="600" y="55" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="30" font-weight="bold" opacity="0.95">BigCode</text>
  <text x="600" y="85" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="15" opacity="0.8">From Open Code Models to Evaluation</text>

  <!-- Timeline line -->
  <line x1="180" y1="360" x2="1020" y2="360" stroke="#475569" stroke-width="3" opacity="0.5"/>
  <!-- transition marker -->
  <line x1="620" y1="310" x2="620" y2="410" stroke="#fbbf24" stroke-width="2" stroke-dasharray="6 4" opacity="0.6"/>
  <text x="620" y="300" text-anchor="middle" fill="#fbbf24" font-family="Arial, sans-serif" font-size="12" font-weight="bold" opacity="0.9">pivot</text>

  <!-- ===== Phase 1: Models (left) ===== -->
  <!-- The Stack (data) -->
  <rect x="140" y="240" width="130" height="55" rx="10" fill="url(#dataGrad)" filter="url(#glow)"/>
  <text x="205" y="265" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="13" font-weight="bold">The Stack v1/v2</text>
  <text x="205" y="283" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10" opacity="0.85">600+ langs · 67TB</text>

  <!-- StarCoder -->
  <rect x="310" y="240" width="130" height="55" rx="10" fill="url(#modelGrad)" filter="url(#glow)"/>
  <text x="375" y="265" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="13" font-weight="bold">StarCoder</text>
  <text x="375" y="283" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10" opacity="0.85">15.5B · 2023</text>

  <!-- StarCoder2 -->
  <rect x="480" y="240" width="130" height="55" rx="10" fill="url(#modelGrad)" filter="url(#glow)"/>
  <text x="545" y="265" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="13" font-weight="bold">StarCoder2</text>
  <text x="545" y="283" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10" opacity="0.85">3B/7B/15B · 2024</text>

  <!-- arrows data->models -->
  <line x1="270" y1="268" x2="305" y2="268" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.6"/>
  <line x1="440" y1="268" x2="475" y2="268" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.6"/>

  <!-- ===== Phase 2: Evaluation (right) ===== -->
  <!-- BigCodeBench -->
  <rect x="660" y="240" width="130" height="55" rx="10" fill="url(#evalGrad)" filter="url(#glow)"/>
  <text x="725" y="265" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="13" font-weight="bold">BigCodeBench</text>
  <text x="725" y="283" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10" opacity="0.9">1140 tasks · ICLR'25</text>

  <!-- BigCodeArena -->
  <rect x="830" y="240" width="130" height="55" rx="10" fill="url(#evalGrad)" filter="url(#glow)"/>
  <text x="895" y="265" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="13" font-weight="bold">BigCodeArena</text>
  <text x="895" y="283" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10" opacity="0.9">exec + human vote</text>

  <!-- Reward -->
  <rect x="1000" y="240" width="100" height="55" rx="10" fill="url(#evalGrad)" filter="url(#glow)"/>
  <text x="1050" y="265" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Reward</text>
  <text x="1050" y="283" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10" opacity="0.9">AutoCodeArena</text>

  <line x1="790" y1="268" x2="825" y2="268" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.6"/>
  <line x1="960" y1="268" x2="995" y2="268" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.6"/>

  <!-- phase labels -->
  <text x="370" y="440" text-anchor="middle" fill="#60a5fa" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Phase 1: Build Models</text>
  <text x="370" y="462" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12" opacity="0.8">fully open · transparent data</text>
  <text x="370" y="480" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12" opacity="0.8">model line stalled after 2024</text>

  <text x="840" y="440" text-anchor="middle" fill="#fbbf24" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Phase 2: Evaluate Models</text>
  <text x="840" y="462" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12" opacity="0.8">active · the judge, not the player</text>
  <text x="840" y="480" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12" opacity="0.8">scoring everyone else now</text>

  <!-- Org badges bottom -->
  <text x="600" y="565" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="14" opacity="0.7">Hugging Face  ·  ServiceNow  ·  NVIDIA</text>
  <text x="600" y="595" text-anchor="middle" fill="#475569" font-family="Arial, sans-serif" font-size="12" opacity="0.6">Open scientific collaboration since 2022</text>

  <!-- corner code brackets -->
  <text x="60" y="630" fill="#60a5fa" font-family="monospace" font-size="48" opacity="0.12">{ }</text>
  <text x="1120" y="630" fill="#fbbf24" font-family="monospace" font-size="48" opacity="0.12">&lt;/&gt;</text>
</svg>
