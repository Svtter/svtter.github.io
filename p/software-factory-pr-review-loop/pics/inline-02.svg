<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Software Factory milestones</title>
  <desc id="desc">A milestone strip showing M1 through M6 completed and M7 in progress.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f3ec" />
      <stop offset="100%" stop-color="#e8dece" />
    </linearGradient>
    <linearGradient id="done" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#213a4d" />
      <stop offset="100%" stop-color="#2f5b75" />
    </linearGradient>
    <linearGradient id="active" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d36e3d" />
      <stop offset="100%" stop-color="#bf4d30" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.14" />
    </filter>
  </defs>

  <rect width="1200" height="520" fill="url(#bg)" />
  <rect x="80" y="70" width="1040" height="380" rx="28" fill="#fffaf3" filter="url(#shadow)" />

  <text x="120" y="130" fill="#243447" font-size="34" font-family="Georgia, serif">MVP Progress</text>
  <text x="120" y="164" fill="#67717c" font-size="18" font-family="Verdana, sans-serif">主路径已经跑通，文档、E2E 和压测还在继续补</text>

  <g font-family="Verdana, sans-serif" text-anchor="middle">
    <rect x="120" y="240" width="120" height="120" rx="22" fill="url(#done)" />
    <text x="180" y="286" fill="#f8f1e8" font-size="28">M1</text>
    <text x="180" y="320" fill="#d2dde6" font-size="15">Skeleton</text>

    <rect x="260" y="240" width="120" height="120" rx="22" fill="url(#done)" />
    <text x="320" y="286" fill="#f8f1e8" font-size="28">M2</text>
    <text x="320" y="320" fill="#d2dde6" font-size="15">Events</text>

    <rect x="400" y="240" width="120" height="120" rx="22" fill="url(#done)" />
    <text x="460" y="286" fill="#f8f1e8" font-size="28">M3</text>
    <text x="460" y="320" fill="#d2dde6" font-size="15">Webhook</text>

    <rect x="540" y="240" width="120" height="120" rx="22" fill="url(#done)" />
    <text x="600" y="286" fill="#f8f1e8" font-size="28">M4</text>
    <text x="600" y="320" fill="#d2dde6" font-size="15">Normalize</text>

    <rect x="680" y="240" width="120" height="120" rx="22" fill="url(#done)" />
    <text x="740" y="286" fill="#f8f1e8" font-size="28">M5</text>
    <text x="740" y="320" fill="#d2dde6" font-size="15">Worker</text>

    <rect x="820" y="240" width="120" height="120" rx="22" fill="url(#done)" />
    <text x="880" y="286" fill="#f8f1e8" font-size="28">M6</text>
    <text x="880" y="320" fill="#d2dde6" font-size="15">Stability</text>

    <rect x="960" y="240" width="120" height="120" rx="22" fill="url(#active)" />
    <text x="1020" y="286" fill="#fff0e8" font-size="28">M7</text>
    <text x="1020" y="320" fill="#ffd8cc" font-size="15">Docs / Tests</text>
  </g>

  <g fill="none" stroke="#697785" stroke-width="4" stroke-linecap="round">
    <path d="M240 300 H260" />
    <path d="M380 300 H400" />
    <path d="M520 300 H540" />
    <path d="M660 300 H680" />
    <path d="M800 300 H820" />
    <path d="M940 300 H960" />
  </g>
</svg>
