<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Software Factory workflow</title>
  <desc id="desc">A simple workflow diagram showing hook and GitHub webhook feeding a normalizer, worker, and thin web UI.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f2ea" />
      <stop offset="100%" stop-color="#ece3d3" />
    </linearGradient>
    <linearGradient id="main" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1b2c3b" />
      <stop offset="100%" stop-color="#284a63" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d56e3d" />
      <stop offset="100%" stop-color="#ba472c" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)" />
  <rect x="84" y="66" width="1032" height="588" rx="28" fill="#fffaf3" filter="url(#shadow)" />

  <text x="120" y="126" fill="#203040" font-size="34" font-family="Georgia, serif">PR Review Autofix Loop</text>
  <text x="120" y="160" fill="#6a7480" font-size="18" font-family="Verdana, sans-serif">software-factory 把 review feedback 变成一条可见、可追踪的自动修复链路</text>

  <g font-family="Verdana, sans-serif" text-anchor="middle">
    <rect x="130" y="250" width="180" height="120" rx="22" fill="#31546d" />
    <text x="220" y="304" fill="#f6efe5" font-size="24">Hook</text>
    <text x="220" y="336" fill="#d4dee6" font-size="16">Session</text>

    <rect x="130" y="420" width="180" height="120" rx="22" fill="#8f603f" />
    <text x="220" y="474" fill="#fbf1e6" font-size="22">GitHub</text>
    <text x="220" y="506" fill="#f3dfd2" font-size="16">Webhook</text>

    <rect x="420" y="335" width="210" height="120" rx="22" fill="url(#accent)" />
    <text x="525" y="388" fill="#fff1e9" font-size="24">Normalizer</text>
    <text x="525" y="420" fill="#ffe2d4" font-size="16">must_fix / should_fix</text>

    <rect x="740" y="250" width="210" height="120" rx="22" fill="url(#main)" />
    <text x="845" y="304" fill="#f7f1e8" font-size="24">Agent Worker</text>
    <text x="845" y="336" fill="#d1dbe3" font-size="16">fix / test / push</text>

    <rect x="740" y="420" width="210" height="120" rx="22" fill="#d9ccb7" />
    <text x="845" y="474" fill="#213244" font-size="24">Thin Web</text>
    <text x="845" y="506" fill="#556272" font-size="16">runs / logs / status</text>
  </g>

  <g fill="none" stroke="#465b6d" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M310 310 H390" />
    <path d="M310 480 H390" />
    <path d="M630 395 H710" />
    <path d="M845 370 V400" />
    <path d="M950 480 H1010 C1048 480 1078 450 1078 412 V270 C1078 232 1048 202 1010 202 H220 C182 202 152 232 152 250" opacity="0.55" />
  </g>

  <g fill="#465b6d">
    <path d="M390 310 l-14 -9 v18 z" />
    <path d="M390 480 l-14 -9 v18 z" />
    <path d="M710 395 l-14 -9 v18 z" />
    <path d="M845 400 l-9 -14 h18 z" transform="rotate(180 845 400)" />
  </g>
</svg>
