<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Software Factory cover</title>
  <desc id="desc">A diagram-like cover showing hooks, webhooks, normalization, agent worker, and a thin web loop.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6efe4" />
      <stop offset="55%" stop-color="#efe7d8" />
      <stop offset="100%" stop-color="#ddd7cb" />
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#18222f" />
      <stop offset="100%" stop-color="#243447" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d96d3c" />
      <stop offset="100%" stop-color="#c4492d" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#1b1b1b" flood-opacity="0.18" />
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)" />
  <circle cx="1260" cy="180" r="220" fill="#cf6a3d" opacity="0.10" />
  <circle cx="260" cy="730" r="260" fill="#21405b" opacity="0.08" />

  <rect x="120" y="110" width="1360" height="680" rx="36" fill="url(#panel)" filter="url(#shadow)" />

  <text x="190" y="210" fill="#f5efe6" font-size="64" font-family="Georgia, serif">Software Factory</text>
  <text x="190" y="265" fill="#d7dde3" font-size="28" font-family="Verdana, sans-serif">Turn PR review feedback into a visible autofix loop</text>

  <g fill="none" stroke="#e4e0d8" stroke-width="6" stroke-linecap="round" opacity="0.75">
    <path d="M390 470 H560" />
    <path d="M770 470 H930" />
    <path d="M1140 470 H1270" />
    <path d="M1270 470 C1325 470 1360 505 1360 560 C1360 615 1325 650 1270 650 H360 C290 650 250 610 250 540 C250 500 272 474 315 470" />
  </g>

  <g fill="#f5efe6" font-family="Verdana, sans-serif" text-anchor="middle">
    <rect x="210" y="390" width="180" height="150" rx="24" fill="#2b455d" />
    <text x="300" y="445" font-size="24">Hook</text>
    <text x="300" y="485" font-size="18" fill="#cdd6dd">Session</text>
    <text x="300" y="512" font-size="18" fill="#cdd6dd">Trigger</text>

    <rect x="560" y="390" width="210" height="150" rx="24" fill="#8e5b3c" />
    <text x="665" y="445" font-size="24">Webhook</text>
    <text x="665" y="485" font-size="18" fill="#f2e6dc">Review</text>
    <text x="665" y="512" font-size="18" fill="#f2e6dc">Events</text>

    <rect x="930" y="390" width="210" height="150" rx="24" fill="url(#accent)" />
    <text x="1035" y="445" font-size="24">Normalizer</text>
    <text x="1035" y="485" font-size="18" fill="#fde8df">Must Fix</text>
    <text x="1035" y="512" font-size="18" fill="#fde8df">Should Fix</text>

    <rect x="1270" y="390" width="180" height="150" rx="24" fill="#35556b" />
    <text x="1360" y="445" font-size="24">Worker</text>
    <text x="1360" y="485" font-size="18" fill="#d8e0e6">Fix</text>
    <text x="1360" y="512" font-size="18" fill="#d8e0e6">Validate</text>

    <rect x="260" y="590" width="230" height="110" rx="24" fill="#e7dcc7" />
    <text x="375" y="640" font-size="24" fill="#243447">Thin Web</text>
    <text x="375" y="675" font-size="18" fill="#566270">Status and Logs</text>
  </g>

  <g fill="#f5efe6" font-family="Verdana, sans-serif">
    <text x="1160" y="220" font-size="22" opacity="0.80">Local-first orchestration</text>
    <text x="1160" y="254" font-size="22" opacity="0.80">FastAPI + SQLite + Agent Worker</text>
  </g>
</svg>
